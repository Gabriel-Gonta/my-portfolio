<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0;url=/my-portfolio/" />
</head>
<body>
  <script>
    (function () {
      var repo = "/my-portfolio";
      var path = window.location.pathname;
      if (path.indexOf(repo) === 0) {
        path = path.slice(repo.length);
      }
      path = path.replace(/^\//, "");
      var isAsset = /\.(js|css|png|jpe?g|gif|svg|ico|json|map|woff2?|ttf|pdf|webp)$/i.test(path);
      if (path && path !== "index.html" && !isAsset && !window.location.hash) {
        window.location.replace(
          repo + "/#/" + path + window.location.search + window.location.hash
        );
      } else if (!isAsset) {
        window.location.replace(repo + "/");
      }
    })();
  </script>
  <p>Redirecting… <a href="/my-portfolio/">Continue to portfolio</a></p>
</body>
</html>
